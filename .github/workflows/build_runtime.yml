name: Build runtimes
on: 
  workflow_dispatch:

env:
  JAVA_VERSION: '21'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos aarch64
          - os: macos-latest
            osheader: osx
            arch: aarch64
            path_sep: ':'
            dist: macOS_aarch64

          # macos x64
          - os: macos-15-intel
            arch: x64
            osheader: osx
            path_sep: ':'
            dist: macOS_x64
            
          # linux ubuntu
          - os: ubuntu-latest
            arch: x64
            osheader: linux
            path_sep: ':'
            dist: linux_x64
            
          # linux aarch64
          - os: ubuntu-24.04-arm
            arch: aarch64
            osheader: linux
            path_sep: ':'
            dist: linux_aarch64

          # windows
          - os: windows-latest
            arch: x64
            osheader: windows
            path_sep: ';'
            dist: windows_x64
            
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check out repository code
      uses: actions/checkout@v6

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-disabled: true
    
    - name: Create package (Windows)
      if: runner.os == "Windows"
      run: ./gradlew.bat jpackageImage
      
    - name: Create package (non-Windows)
      if: runner.os != "Windows"
      run: ./gradle jpackageImage

    - name: Package artifacts (Windows)
      if: runner.os == "Windows"
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        Set-StrictMode -Version Latest
        $PSNativeCommandUseErrorActionPreference = $true
        
        $DIST = "${{ matrix.dist }}"
        New-Item -ItemType Directory -Force -Path $DIST | Out-Null
        Move-Item -Path ./build/jpackage/* -Destination $DIST/

    - name: Package artifacts (non-Windows)
      if: runner.os != "Windows"
      shell: bash
      run: |
        set -euo pipefail
        
        DIST="${{ matrix.dist }}"
        mkdir -p "$DIST"
        mv ./build/jpackage/* "$DIST/"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: test_${{ matrix.os }}_${{ matrix.arch }}
        path: |
          ${{ matrix.dist }}/**
